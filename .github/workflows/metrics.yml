name: Metrics

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics (base)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Asmit1434
          template: classic
          base: half,rim,header
          base_timezone: Asia/Kolkata
          base_lines: 6
          base_author: true
          commits_author: true
          commits_count: 100
          commits_limit: 100
          commits_sort: date
          commits_date_range: year
          activity: true
          activity_limit: 50
          activity_days: 7

      - name: Generate metrics (languages)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Asmit1434
          template: classic
          languages: true
          languages_limit: 12
          languages_details: true

      - name: Generate metrics (isometric calendar)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Asmit1434
          template: classic
          isocalendar: true
          isocalendar_duration: half-year

      - name: Generate metrics (habits)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Asmit1434
          template: classic
          habits: true
          habits_charts: true
          habits_facts: true

      - name: Generate metrics (achievements)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Asmit1434
          template: classic
          achievements: true
          achievements_compact: true

      - name: Generate metrics (lines of code)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Asmit1434
          template: classic
          lines: true
          lines_history_limit: 4
          lines_repositories: "*"
          lines_sort: date

      - name: Generate metrics (topics)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Asmit1434
          template: classic
          topics: true
          topics_limit: 12
          topics_icons: true

      - name: Generate metrics (repositories)
        uses: lowlighter/metrics@v3.34
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: Asmit1434
          template: classic
          repositories: true
          repositories_pinned: 6
          repositories_sort: stars

      - name: Deploy metrics
        uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: gh-pages
          build_dir: metrics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
